<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">
  <title>De María para Joselin</title>

  <style>
    body {
      background-color: #0f0f0f;
      color: #eaeaea;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #ff758f;
    }

    p {
      font-size: 18px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>No matter the distance... ❤️</h1>

<button onclick="mensaje()">Pica aquí 💖</button>

<p id="texto"></p>

<script>
function mensaje() {
  let msg = "I may not see you every day, but I love you every day ❤️";
  let i = 0;

  let intervalo = setInterval(() => {
    document.getElementById("texto").innerHTML += msg[i];
    i++;

    if (i >= msg.length) clearInterval(intervalo);
  }, 50);
}
</script>

</body>
</html>
